<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>買餸 | 離線模式</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
        background:
          radial-gradient(circle at top left, #f5edf5 0, transparent 42%),
          radial-gradient(circle at bottom right, #e9f1fb 0, transparent 40%),
          #fcfcfd;
        color: #1d1d1f;
      }

      main {
        width: min(92vw, 420px);
        background: rgba(255, 255, 255, 0.82);
        border-radius: 28px;
        padding: 28px 24px;
        box-shadow: 0 16px 40px rgba(0, 0, 0, 0.06);
        text-align: center;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 28px;
      }

      p {
        margin: 0 0 12px;
        line-height: 1.6;
        color: #666;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>目前離線</h1>
      <p>網絡連線暫時中斷，未能更新街市價格。</p>
      <p>恢復網絡後重新打開 App，就會繼續載入最新資料。</p>
    </main>
  </body>
</html>
