name: Keep Render Warm

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping Render health endpoint
        run: |
          curl --fail --silent --show-error https://macau-market-api.onrender.com/api/health
